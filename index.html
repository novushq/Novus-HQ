<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novus HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0f;
      --text: #e8eaf0;
      --muted: #4b5563;
      --accent: #7fffb2;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(127,255,178,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 0;
      filter: blur(60px);
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      animation: fade-up 0.8s ease both;
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 64px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent); color: #000;
      font-weight: 800; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
    }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
    .logo-hq { color: var(--accent); }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px; letter-spacing: 0.1em;
      color: var(--accent);
      border: 1px solid rgba(127,255,178,0.2);
      background: rgba(127,255,178,0.06);
      padding: 6px 14px; border-radius: 40px;
      margin-bottom: 36px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    h1 {
      font-size: clamp(40px, 8vw, 88px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 em { font-style: italic; color: var(--accent); }
    p {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .footer-note {
      position: fixed; bottom: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 12px; color: var(--muted);
      letter-spacing: 0.04em;
      z-index: 1;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">N</div>
      <span class="logo-text">NOVUS<span class="logo-hq">HQ</span></span>
    </div>
    <div class="badge">
      <span class="dot"></span>
      UNDER CONSTRUCTION
    </div>
    <h1>We build<br /><em>apps.</em></h1>
    <p>Something great is on the way.</p>
    <p>Check back soon.</p>
  </div>
  <div class="footer-note">novushq.app</div>
</body>
</html>
